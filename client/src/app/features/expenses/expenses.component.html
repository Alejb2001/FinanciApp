<div class="expenses-header">
  <h2>Gastos</h2>
  <button mat-raised-button color="primary" (click)="openForm()">
    <mat-icon>add</mat-icon> Nuevo gasto
  </button>
</div>

<mat-card>
  <mat-card-content>

    @if (loading) {
      <div class="loading-container">
        <mat-spinner diameter="48" />
      </div>
    } @else if (expenses.length === 0) {
      <div class="empty-state">
        <mat-icon>receipt_long</mat-icon>
        <p>No hay gastos registrados aún</p>
        <button mat-stroked-button color="primary" (click)="openForm()">Registrar primer gasto</button>
      </div>
    } @else {
      <table mat-table [dataSource]="expenses" class="expenses-table">

        <!-- Fecha -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Fecha</th>
          <td mat-cell *matCellDef="let e">{{ e.date | date:'dd/MM/yyyy' }}</td>
        </ng-container>

        <!-- Categoría -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Categoría</th>
          <td mat-cell *matCellDef="let e">
            <mat-chip class="category-chip"
              [style.background-color]="getCategoryColor(e.category) + '22'"
              [style.color]="getCategoryColor(e.category)">
              {{ getCategoryName(e.category) }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Descripción -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Descripción</th>
          <td mat-cell *matCellDef="let e">{{ e.description }}</td>
        </ng-container>

        <!-- Monto -->
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef class="amount-header">Monto</th>
          <td mat-cell *matCellDef="let e" class="amount-cell">
            {{ e.amount | currency:'USD':'symbol':'1.2-2' }}
          </td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let e" class="actions-cell">
            <button mat-icon-button color="primary" matTooltip="Editar" (click)="openForm(e)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="delete(e)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    }

  </mat-card-content>
</mat-card>
