<mat-sidenav-container class="app-container">

  <mat-sidenav [(opened)]="sidenavOpen" mode="side" class="app-sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">account_balance_wallet</mat-icon>
      <span class="app-title">FinanciaApp</span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/expenses" routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Gastos</span>
      </a>
      <a mat-list-item routerLink="/budgets" routerLinkActive="active-link">
        <mat-icon matListItemIcon>savings</mat-icon>
        <span matListItemTitle>Presupuestos</span>
      </a>
      <a mat-list-item routerLink="/categories" routerLinkActive="active-link">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Categorías</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button (click)="sidenavOpen = !sidenavOpen">
        <mat-icon>menu</mat-icon>
      </button>
      <span>FinanciaApp</span>
    </mat-toolbar>

    <div class="page-container">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
